spring.application.name=xiaoyuan

# 激活 local 配置文件（敏感配置从 application-local.properties 加载）
spring.profiles.active=local

# =============================
# 数据源配置
# =============================
spring.datasource.url=jdbc:mysql://localhost:3306/school_lost_found?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================
# Redis 配置
# =============================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=60000ms
spring.data.redis.password=

# =============================
# MyBatis-Plus 基础配置
# =============================
mybatis-plus.configuration.map-underscore-to-camel-case=true

# =============================
# JWT 配置
# =============================
jwt.secret=
jwt.expire-minutes=5256000
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql

# =============================
# 文件上传限制配置
# =============================
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# =============================
# OSS 配置
# =============================
oss.endpoint=https://oss-cn-guangzhou.aliyuncs.com
oss.access-key-id=
oss.access-key-secret=
oss.bucket=school-lost-found-img
oss.public-url-prefix=https://school-lost-found-img.oss-cn-guangzhou.aliyuncs.com

# =============================
# AI 配置
# =============================
zhipu.api.key=
